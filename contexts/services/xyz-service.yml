service_name: "xyz-service"
architecture: "microservice"

repository_topology:
  service_and_tests: "split-qa"
  deployment: "separate-repo"

repositories:
  microservices_root: "projects/microservices"
  service_repo: "xyz-service"
  deployment_repo: "xyz-deployments"
  qa_steps: "qa-steps"
  qa_project: "qa-projects/xyz-service-api-tests"

api:
  endpoint: "GET /xyz"
  request_query_param: "customerId"

validation:
  service_port: 8081
  test_port_property: "api.port"
  service_start_command: "mvn spring-boot:run -Dspring-boot.run.arguments=--server.port=8081"
  api_test_command: "mvn -pl qa-projects/xyz-service-api-tests -am test -Dapi.port=8081"
  notes:
    - "Start the service command first and keep it running while API tests execute."
    - "Use port 8081 because local llama.cpp may already use 8080."

behavior_contract:
  supported_validation:
    - "missing customerId returns 400"
    - "blank customerId returns 400"
  unsupported_validation:
    - "format validation such as INVALID_ID_FORMAT returning 400 is not implemented or documented"
  examples:
    low:
      customerId: "CUST-1001"
      riskCategory: "LOW"
      eligible: true
      score: 18
      decisionReason: "Customer is eligible with low risk signals."
    medium:
      customerId: "CUST-5000"
      riskCategory: "MEDIUM"
      eligible: true
      score: 57
      decisionReason: "Customer is eligible with standard monitoring."
    high:
      customerId: "CUST-9999"
      riskCategory: "HIGH"
      eligible: false
      score: 91
      decisionReason: "Customer requires manual review before eligibility."
